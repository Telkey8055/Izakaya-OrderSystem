<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  
  <title>居酒屋注文</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Hiragino Kaku Gothic ProN", sans-serif;
      background: #1a1a1a;
      color:#fff;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    /* user-scalable=no */
    /* 背景情報 */
    .bg { 
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: url("images/izakaya.png") center/cover no-repeat;
      filter: blur(2px) brightness(0.65);
      z-index: -1;
    }

    /* メインコンテナ */
    .container {
        text-align: center;
        padding-top: 100px;
    }

    .lanterns {
        display: flex;
        justify-content: center;
        gap: 100px;
        margin-bottom: 20px;
    }

    .lantern {
        background: url("images/Chochin.png") center/contain no-repeat;
        width: 200px;
        height: 280px;

        display: flex;
        justify-content: center;
        align-items: center;

        color: black;
        font-weight: bold;
        font-size: 24px;

        writing-mode: vertical-rl;
        text-orientation: upright;
        filter :drop-shadow(0 0 20px rgba(255, 100, 50, 0.8));
    }

    /* 暖簾 */
    .noren {
        background: #0d1b2a;
        padding: 30px;
        margin: 0 auto;
        width: 70%;
        border-radius: 10px;
        position: relative;
    }

    .noren::after {
        content: "";
        position: absolute;
        bottom: -10px;
        left: 10%;
        width: 80%;
        height: 10px;
        background: repeating-linear-gradient(
            to right,
            transparent,
            transparent 10px,
            #0d1b2a 10px,
            #0d1b2a 20px
        );
    }

    .hidden {
      display: none;
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 10px;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
    }

    .counter {
      display: flex;
      align-items: center;
    }

    .counter button {
      width: 40px;
      height: 40px;
    }

    .counter span {
      margin: 0 10px;
      font-size: 18px;
      width: 30px;
      display: inline-block;
    }

    @media screen and (max-width: 768px) {
    .title { font-size: 24px; }
    .lantern { width: 240px; height: 360px; }
    .start-btn { width: 80%; }
    .bg {
        background: url("images/izakaya_mobile.png") center/cover no-repeat;
        background-position: center top;
        background-size: cover;
    }

    .container {
        padding-top: 40px;
    }
    }
  </style>
</head>
<body>

<!-- ① ウェルカム画面 -->
<div id="welcome">

   <div class="bg"></div>

   <div class="container">

        <!-- 提灯 -->
        <div class="lanterns">
            <div class="lantern">生</div>
            <div class="lantern">焼</div>
            <div class="lantern">揚</div>
            <div class="lantern">豆</div>
            <div class="lantern">酒</div>
        </div>

        <!-- 暖簾 -->
        <div class="noren">
            <!-- <div>いらっしゃいませ！</div> -->
            <div class="title">居酒屋へようこそ</div>
        </div>

    </div>
  <!--<h1>ようこそ！いのう衞</h1>-->
  <button onclick="showMenu()">注文する</button>
</div>

<!-- ② メニュー画面 -->
<div id="menu" class="hidden">
  <h2>メニュー</h2>
  <div id="menuList"></div>
  <button onclick="submitOrder()">注文する</button>
</div>

<script>
const menuData = [
  "ビール",
  "ハイボール",
  "唐揚げ",
  "枝豆",
  "ポテトフライ"
];

let order = {};

// 初期化
function initMenu() {
  const menuList = document.getElementById("menuList");
  menuData.forEach(item => {
    order[item] = 0;

    const div = document.createElement("div");
    div.className = "menu-item";

    div.innerHTML = `
      <span>${item}</span>
      <div class="counter">
        <button onclick="changeCount('${item}', -1)">-</button>
        <span id="${item}">0</span>
        <button onclick="changeCount('${item}', 1)">+</button>
      </div>
    `;

    menuList.appendChild(div);
  });
}

// ②画面遷移
function showMenu() {
  document.getElementById("welcome").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

// ④個数調整
function changeCount(item, delta) {
  order[item] += delta;
  if (order[item] < 0) order[item] = 0;
  document.getElementById(item).innerText = order[item];
}

// ⑤注文送信
function submitOrder() {
  const filteredOrder = Object.entries(order)
    .filter(([_, qty]) => qty > 0);

  if (filteredOrder.length === 0) {
    alert("注文がありません");
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbxcMc3tseF84gEx1TgsXlZgd0rwYeWY4gLG8f0wew99ZX72xXO8u75KJMW7WT9dG_dc/exec", {
    method: "POST",
    body: JSON.stringify(filteredOrder)
  })
  .then(() => {
    alert("注文を送信しました！");
  })
  .catch(() => {
    alert("送信失敗");
  });
}

initMenu();
</script>

</body>
</html>
